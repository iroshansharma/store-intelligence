version: '3.8'

services:
  api:
    build: .
    container_name: store_intelligence_api
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////workspace/store_intelligence.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
